<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes</title>
  <link rel="stylesheet" href="/styles/shared/general.css">
  <link rel="stylesheet" href="/styles/pages/notes.css">
</head>
<body>
  <header>
    <h1>My notes</h1>
    <div>
      <button id ="js-add-note-btn" class="add-note-btn">+ Add Note</button>
      <button id ="themeToggleBtn" class="theme-toggle-btn">🌙</button>
      <button id ="js-logout-btn" class="logout-btn">Logout</button>
    </div>
  </header>
  <main id="notesContainer" class="notes-grid">

  </main>
  <dialog id="noteDialog">
    <div class="dialog-content">
      <div class="dialog-header">
        <h2 class="dialog-title" id="dialogTitle">Add New Note</h2>
        <button class="close-btn" id="js-close-btn">x</button>
      </div>

      <form id="noteForm">
        <div class="form-group">
          <label for="noteTitle" class="form-label">Title</label>
          <input type="text" id="noteTitle" name="title" class="form-input" placeholder="Enter note title..." maxlength="100" required>
        </div>

        <div class="form-group">
          <label for="noteContent" class="form-label">Content</label>
          <textarea id="noteContent" name="content" class="form-textarea" placeholder="Write your note here..." maxlength="5000" required></textarea>
        </div>

        <div class="dialog-actions">
          <button type="button" id="js-cancel-btn" class="cancel-btn">Cancel</button>
          <button type="submit" class="save-btn">Save Note</button>
        </div>
      </form>
    </div>
  </dialog>
  <script type="module" src="/scripts/notes/notes.js" defer></script>
</body>
</html>
